kind = "web"
previewPath = "/"
title = "Blue Mogul Bookkeeping AI"
version = "1.0.0"
id = "artifacts/bookkeeper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23932
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bookkeeper run dev"

[services.env]
PORT = "23932"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bookkeeper", "run", "build"]
publicDir = "artifacts/bookkeeper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
